# Standalone web/API deploy for Odigo (Go backend).
# Serves BOTH:
#   - odigo.your.team       (web preview shell + panels)
#   - api-odigo.your.team   (JSON API for the Wails desktop app)
# Joins the existing external `www_appnet` so the shared ingress can proxy to it,
# and connects to the shared `www-pgsql-1` Postgres. Never touches /var/www/compose.yaml.
#
#   docker compose -f deploy/docker-compose.yml -p odigo up -d --build --remove-orphans

services:
  odigo-api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: odigo/backend:latest
    restart: unless-stopped
    env_file: ./odigo.env      # DATABASE_URL (secret, gitignored)
    environment:
      PORT: "8080"
    networks: [appnet]

networks:
  appnet:
    external: true
    name: www_appnet
