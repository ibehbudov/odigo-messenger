name: Build Odigo

# Build the Wails v3 desktop app (Go) for Linux, Windows and macOS.
# Each runner builds its NATIVE architecture (macos-latest = Apple Silicon arm64),
# which also sidesteps the old dual-arch mac race. Trigger with a `v*` tag or manually.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: mac

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Linux deps (GTK4 + WebKitGTK 6.0)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Sync shared frontend into the desktop embed dir
        shell: bash
        run: |
          rm -rf desktop/frontend/dist
          mkdir -p desktop/frontend/dist
          cp -r frontend/odigo frontend/w frontend/index.html desktop/frontend/dist/

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          cd desktop && go build -trimpath -ldflags="-s -w" -o ../dist/odigo .
          cd .. && (cd dist && zip -r Odigo-linux.zip odigo)

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          cd desktop && go build -trimpath -ldflags="-s -w -H windowsgui" -o ../dist/Odigo.exe .

      - name: Build (macOS, .app bundle)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          cd desktop && go build -trimpath -ldflags="-s -w" -o /tmp/odigo-bin .
          cd ..
          APP="dist/Odigo.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp /tmp/odigo-bin "$APP/Contents/MacOS/Odigo"
          chmod +x "$APP/Contents/MacOS/Odigo"
          cat > "$APP/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleName</key><string>Odigo</string>
            <key>CFBundleDisplayName</key><string>Odigo</string>
            <key>CFBundleIdentifier</key><string>com.ibehbudov.odigo</string>
            <key>CFBundleVersion</key><string>2.0.0</string>
            <key>CFBundleShortVersionString</key><string>2.0.0</string>
            <key>CFBundleExecutable</key><string>Odigo</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>10.15</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict></plist>
          PLIST
          # ad-hoc sign so it at least runs after quarantine removal
          codesign --force --deep --sign - "$APP" || true
          (cd dist && zip -r Odigo-mac-arm64.zip Odigo.app)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: odigo-${{ matrix.platform }}
          path: |
            dist/Odigo-linux.zip
            dist/Odigo.exe
            dist/Odigo-mac-arm64.zip
          if-no-files-found: warn

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Odigo ${{ github.ref_name }} — Wails v3 (Go) desktop

            - **macOS (Apple Silicon):** `Odigo-mac-arm64.zip` → unzip → `Odigo.app`
            - **Windows:** `Odigo.exe`
            - **Linux:** `Odigo-linux.zip` (needs `gtk4` + `webkitgtk-6.0` installed)

            The app talks to the API at `https://api-odigo.your.team`.

            ### macOS: "Odigo is damaged and can't be opened"
            The app is not signed with an Apple Developer ID, so macOS quarantines it.
            It is not damaged. To open:
            ```
            xattr -cr /Applications/Odigo.app
            ```
            (move Odigo.app to Applications first; right-click → Open is not enough).
          files: |
            dist/Odigo-linux.zip
            dist/Odigo.exe
            dist/Odigo-mac-arm64.zip
